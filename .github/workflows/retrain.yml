name: Automated Retraining Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'notebooks/02_preprocessing.py'
      - 'config/training_config.yaml'
      - 'src/model.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install validation deps
        run: pip install pyflakes pyyaml

      - name: Syntax check Python files
        run: |
          for f in notebooks/*.py src/*.py; do
            echo "Checking $f ..."
            python -m pyflakes "$f" || true
          done

      - name: Validate training_config.yaml
        run: |
          python -c "
          import yaml
          with open('config/training_config.yaml') as f:
              cfg = yaml.safe_load(f)
          for key in ['model','training','data','mlflow']:
              assert key in cfg, f'Missing key: {key}'
          print('config/training_config.yaml is valid ✅')
          "

  retrain:
    name: Train DistilBERT on CPU
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.44.0 mlflow==2.15.1 scikit-learn==1.5.1
          pip install rouge-score pyyaml pandas numpy huggingface_hub

      - name: Create required folders
        run: mkdir -p outputs artifacts

      - name: Verify dataset exists
        run: |
          ls data/
          echo "Dataset size: $(du -sh data/mtsamples.csv)"

      - name: Run preprocessing
        run: python notebooks/02_preprocessing.py

      - name: Run training (1 epoch for CI)
        run: |
          sed -i 's/num_train_epochs: 3/num_train_epochs: 1/' config/training_config.yaml
          python notebooks/03_fine_tuning.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: outputs/mlflow.db
          if-no-files-found: ignore

      - name: Post summary
        if: always()
        run: |
          echo "## 🤖 Retraining Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** push to \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Model:** DistilBERT (CPU)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
