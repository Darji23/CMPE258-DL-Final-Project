# =============================================================
# .github/workflows/retrain.yml
# CI/CD Pipeline — Automated Retraining (MLOps Level 4)
#
# TRIGGER: push to main on these files:
#   - notebooks/02_preprocessing.py
#   - config/training_config.yaml
#   - src/model.py
#
# SETUP (one-time):
#   GitHub repo → Settings → Secrets → Actions → New secret:
#     HF_TOKEN  : hf_xxxxxxxxxxxx   (your Hugging Face token)
#
# NOTE: Training runs on GitHub's free CPU runner (2 vCPUs, 7GB RAM).
#   DistilBERT fits comfortably — no GPU needed.
# =============================================================

name: Automated Retraining Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'notebooks/02_preprocessing.py'
      - 'config/training_config.yaml'
      - 'src/model.py'
  workflow_dispatch:

jobs:
  validate:
    name: Validate code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install validation deps
        run: pip install pyflakes pyyaml

      - name: Syntax check all Python files
        run: |
          for f in notebooks/*.py src/*.py; do
            echo "Checking $f ..."
            python -m pyflakes "$f" || true
          done

      - name: Validate training_config.yaml
        run: |
          python -c "
          import yaml
          with open('config/training_config.yaml') as f:
              cfg = yaml.safe_load(f)
          for key in ['model','training','data','mlflow']:
              assert key in cfg, f'Missing key: {key}'
          print('config/training_config.yaml ✅')
          "

  retrain:
    name: Train DistilBERT on CPU
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download MTSamples dataset
        run: |
          mkdir -p data
          pip install kaggle
          # If KAGGLE_USERNAME and KAGGLE_KEY secrets are set:
          # kaggle datasets download -d tboyle10/medicaltranscriptions -p data --unzip
          # Otherwise the dataset must already be in data/ via git-lfs or DVC
          echo "Dataset step — add your download method here"

      - name: Run preprocessing
        run: python notebooks/02_preprocessing.py

      - name: Run training (1 epoch for CI speed)
        run: |
          # Override epochs to 1 for CI run
          sed -i 's/num_train_epochs: 3/num_train_epochs: 1/' config/training_config.yaml
          python notebooks/03_fine_tuning.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: outputs/mlruns/

      - name: Post summary
        if: always()
        run: |
          echo "## 🤖 Retraining Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** push to \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Model:** DistilBERT (CPU)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
