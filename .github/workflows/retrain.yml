name: Automated Retraining Pipeline
on:
  push:
    branches: [ main ]
    paths:
      - 'notebooks/02_preprocessing.py'
      - 'config/training_config.yaml'
      - 'src/model.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TOKENIZERS_PARALLELISM: "false"          # ✅ quoted string
  MLFLOW_TRACKING_URI: "./mlruns"          # ✅ force local, prevent remote hang

jobs:
  validate:
    name: Validate code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install validation deps
        run: pip install pyflakes pyyaml
      - name: Syntax check Python files
        run: |
          for f in notebooks/*.py src/*.py; do
            echo "Checking $f ..."
            python -m pyflakes "$f" || true
          done
      - name: Validate training_config.yaml
        run: |
          python -c "
          import yaml
          with open('config/training_config.yaml') as f:
              cfg = yaml.safe_load(f)
          for key in ['model','training','data','mlflow']:
              assert key in cfg, f'Missing key: {key}'
          print('config/training_config.yaml is valid ✅')
          "

  retrain:
    name: Train DistilBERT on CPU
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.44.0 mlflow==2.15.1 scikit-learn==1.5.1
          pip install rouge-score pyyaml pandas numpy huggingface_hub

      - name: Create required folders
        run: mkdir -p outputs artifacts mlruns

      - name: Verify dataset exists
        run: |
          ls data/
          echo "Dataset size: $(du -sh data/mtsamples.csv)"

      - name: Run preprocessing
        run: python -u notebooks/02_preprocessing.py 2>&1 | tee outputs/preprocessing.log

      - name: Patch config for CI (1 epoch)
        run: |
          # Use a flexible pattern to handle any current value
          sed -i 's/num_train_epochs:[[:space:]]*[0-9]*/num_train_epochs: 1/' config/training_config.yaml
          echo "--- Patched training config ---"
          grep "num_train_epochs" config/training_config.yaml   # ✅ verify it worked

      - name: Run training (1 epoch for CI)
        timeout-minutes: 45                                      # ✅ fail fast if hung
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TOKENIZERS_PARALLELISM: "false"
          MLFLOW_TRACKING_URI: "./mlruns"
        run: |
          python -u notebooks/03_fine_tuning.py 2>&1 | tee outputs/training.log
          echo "Exit code: $?"

      - name: Upload training logs (always)
        if: always()                                             # ✅ captures hang/crash logs
        uses: actions/upload-artifact@v4
        with:
          name: training-logs
          path: |
            outputs/preprocessing.log
            outputs/training.log

      - name: Upload MLflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: |
            outputs/mlflow.db
            mlruns/
          if-no-files-found: ignore

      - name: Post summary
        if: always()
        run: |
          echo "## 🤖 Retraining Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }} on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Model:** DistilBERT (CPU)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -f outputs/training.log ]; then
            echo "### Last 20 lines of training log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 outputs/training.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
